services:
  - type: web
    name: stock-research-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-nano-30b-a3b:free
      - key: OPENROUTER_FAST_MODEL
        value: nvidia/nemotron-3-nano-30b-a3b:free
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
